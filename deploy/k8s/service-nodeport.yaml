# Fallback: expose on a fixed NodePort, reachable at http://<node-public-ip>:30080
# (node public IPs: 159.194.235.6, 5.35.90.243). Apply this if the LoadBalancer
# Service EXTERNAL-IP stays <pending>.
apiVersion: v1
kind: Service
metadata:
  name: flyuxora-nodeport
  namespace: flyuxora
  labels:
    app.kubernetes.io/name: flyuxora
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: flyuxora
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
      protocol: TCP
