# Primary: publish via a LoadBalancer-type Service (port 80 -> container 3000).
# On Beget/Cilium this needs a CiliumLoadBalancerIPPool; if EXTERNAL-IP stays
# <pending>, apply service-nodeport.yaml instead (reachable on a node public IP).
apiVersion: v1
kind: Service
metadata:
  name: flyuxora
  namespace: flyuxora
  labels:
    app.kubernetes.io/name: flyuxora
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: flyuxora
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
